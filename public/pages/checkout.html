<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Over2You</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .checkout-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem var(--container-gutter) 4rem;
      display: grid;
      grid-template-columns: 1fr;
      gap: 3rem;
    }
    @media (min-width: 900px) {
      .checkout-wrapper { grid-template-columns: 1.3fr 0.7fr; }
    }

    .checkout-title {
      font: var(--heading-font-style) 800 1.5rem / 1.2 var(--heading-font-family);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgb(var(--border-color));
    }

    /* Form */
    .form-section { margin-bottom: 2rem; }
    .form-section-title {
      font: var(--heading-font-style) 700 var(--text-sm) / 1.4 var(--heading-font-family);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
      color: rgb(var(--text-color) / 0.6);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .form-row.two-col { grid-template-columns: 1fr 1fr; }
    @media (max-width: 600px) { .form-row.two-col { grid-template-columns: 1fr; } }

    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-group label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgb(var(--text-color) / 0.6);
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 0.7rem 0.8rem;
      border: 1px solid rgb(var(--border-color));
      font: var(--text-font-style) var(--text-font-weight) var(--text-base) / 1.65 var(--text-font-family);
      color: rgb(var(--text-color));
      background: rgb(var(--background));
      outline: none;
      border-radius: 0;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: rgb(var(--text-color));
    }
    .form-group input.error { border-color: #c94c4c; }

    /* Payment Methods */
    .payment-methods { margin: 1.5rem 0; }
    .payment-option {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 1rem;
      border: 1px solid rgb(var(--border-color));
      margin-bottom: -1px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .payment-option:first-child { border-top-left-radius: 0; border-top-right-radius: 0; }
    .payment-option:last-child { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
    .payment-option:hover { background: rgb(var(--text-color) / 0.02); }
    .payment-option.selected {
      background: rgb(var(--text-color) / 0.03);
      border-color: rgb(var(--text-color));
      z-index: 1;
      position: relative;
    }
    .payment-option input[type="radio"] { margin-top: 2px; accent-color: rgb(var(--text-color)); }
    .payment-option-info { flex: 1; }
    .payment-option-label {
      font: var(--heading-font-style) 600 var(--text-sm) / 1.4 var(--heading-font-family);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.2rem;
    }
    .payment-option-desc { font-size: 11px; color: rgb(var(--text-color) / 0.5); }

    .bank-details {
      display: none;
      padding: 1rem;
      background: #f9f9f9;
      border: 1px solid rgb(var(--border-color));
      border-top: none;
      font-size: var(--text-sm);
      line-height: 1.8;
    }
    .bank-details.visible { display: block; }
    .bank-details strong { font-weight: 700; }

    /* Order Summary */
    .order-summary {
      position: sticky;
      top: 80px;
      height: fit-content;
    }
    .order-summary-title {
      font: var(--heading-font-style) 700 var(--text-sm) / 1.4 var(--heading-font-family);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgb(var(--border-color));
    }
    .summary-item {
      display: flex;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgb(var(--border-color) / 0.15);
    }
    .summary-item-swatch {
      width: 50px;
      height: 65px;
      flex-shrink: 0;
    }
    .summary-item-info { flex: 1; }
    .summary-item-name {
      font: var(--heading-font-style) 600 11px / 1.4 var(--heading-font-family);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.15rem;
    }
    .summary-item-variant { font-size: 10px; color: rgb(var(--text-color) / 0.5); }
    .summary-item-price { font-size: var(--text-sm); font-weight: 600; text-align: right; white-space: nowrap; }

    .summary-totals { margin-top: 1rem; }
    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 0;
      font-size: var(--text-sm);
    }
    .summary-row.total {
      font: var(--heading-font-style) 700 var(--text-base) / 1.4 var(--heading-font-family);
      border-top: 1px solid rgb(var(--border-color));
      padding-top: 0.75rem;
      margin-top: 0.5rem;
    }

    .btn-place-order {
      display: block;
      width: 100%;
      padding: 1rem;
      background: rgb(var(--button-background));
      color: rgb(var(--button-text-color));
      font: var(--heading-font-style) 800 var(--text-sm) / 1.65 var(--heading-font-family);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      text-align: center;
      border: none;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: opacity 0.3s;
    }
    .btn-place-order:hover { opacity: 0.85; }
    .btn-place-order:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.85rem;
      background: #25D366;
      color: #fff;
      font: var(--heading-font-style) 700 var(--text-sm) / 1.65 var(--heading-font-family);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      text-align: center;
      border: none;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: opacity 0.3s;
    }
    .btn-whatsapp:hover { opacity: 0.85; }

    .secure-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
      font-size: 10px;
      color: rgb(var(--text-color) / 0.4);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .empty-checkout {
      text-align: center;
      padding: 4rem 2rem;
      grid-column: 1 / -1;
    }
    .empty-checkout h2 {
      font: var(--heading-font-style) 800 1.25rem / 1.2 var(--heading-font-family);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
    }
    .empty-checkout p { color: rgb(var(--text-color) / 0.5); margin-bottom: 1.5rem; }
  </style>
</head>
<body class="color-scheme color-scheme--scheme-1">

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-primary-nav">
        <button class="menu-toggle" id="menuToggle" aria-label="Menu"><span></span><span></span><span></span></button>
        <a href="../index.html" class="nav-link">NEW IN</a>
        <div class="nav-dropdown"><a href="#" class="nav-link nav-dropdown-trigger">SHOP ALL</a></div>
        <a href="shop.html" class="nav-link">OVER2YOU+</a>
      </div>
      <a href="../index.html" class="header-logo"><span class="logo-text">OVER2YOU</span></a>
      <div class="header-secondary-nav">
        <button class="icon-btn cart-btn" id="cartBtn" aria-label="Cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile Nav -->
  <div class="mobile-nav-overlay" id="mobileNavOverlay"></div>
  <nav class="mobile-nav" id="mobileNav">
    <div class="mobile-nav-header">
      <button class="menu-close" id="menuCloseBtn" aria-label="Close menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6L6 18M6 6l12 12"></path></svg>
      </button>
    </div>
    <div class="mobile-nav-content">
      <ul class="nav-list main-nav-list" id="mainNavList">
        <li><a href="../index.html" class="mobile-nav-link">HOME</a></li>
        <li><a href="shop.html" class="mobile-nav-link">SHOP ALL</a></li>
      </ul>
    </div>
  </nav>

  <!-- Checkout -->
  <div class="checkout-wrapper" id="checkoutWrapper">
    <!-- Filled by JS -->
  </div>

  <!-- Cart Drawer -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer-header"><h3>CART</h3><button class="cart-drawer-close" id="cartClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="cart-drawer-body" id="cartBody"><p class="cart-empty-msg">Your cart is empty</p></div>
    <div class="cart-drawer-footer" id="cartFooter" style="display:none;">
      <div class="cart-total-row"><span>Total</span><span id="cartTotal">€0.00</span></div>
      <button class="btn-checkout" onclick="window.location.href='checkout.html'">CHECKOUT</button>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-grid">
      <div class="footer-col"><h4>SUPPORT</h4><a href="mailto:SUPPORT@OVER2YOU.COM">SUPPORT@OVER2YOU.COM</a></div>
      <div class="footer-col"><h4>Service</h4><a href="#">Returns</a><a href="#">Shipping</a></div>
      <div class="footer-col"><h4>Legal</h4><a href="#">Privacy Policy</a><a href="#">Terms of Service</a></div>
    </div>
    <div class="footer-bottom"><p>© 2026 - Over2You. All rights reserved.</p></div>
  </footer>

  <script src="../js/app.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const wrapper = document.getElementById('checkoutWrapper');
    const items = Cart.getItems();

    if (items.length === 0) {
      wrapper.innerHTML = `
        <div class="empty-checkout">
          <h2>Your cart is empty</h2>
          <p>Add some products before checking out.</p>
          <a href="shop.html" class="btn-primary">CONTINUE SHOPPING</a>
        </div>`;
      return;
    }

    const subtotal = items.reduce((s, i) => s + (i.price * i.qty), 0);
    const shipping = subtotal >= 100 ? 0 : 6.90;
    const total = subtotal + shipping;

    wrapper.innerHTML = `
      <!-- LEFT: Form -->
      <div class="checkout-form">
        <h1 class="checkout-title">Checkout</h1>
        <form id="orderForm">
          <div class="form-section">
            <div class="form-section-title">Contact Information</div>
            <div class="form-row two-col">
              <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
              </div>
              <div class="form-group">
                <label for="phone">Phone *</label>
                <input type="tel" id="phone" name="phone" required placeholder="+90 5XX XXX XX XX">
              </div>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-title">Shipping Address</div>
            <div class="form-row two-col">
              <div class="form-group">
                <label for="firstName">First Name *</label>
                <input type="text" id="firstName" name="firstName" required>
              </div>
              <div class="form-group">
                <label for="lastName">Last Name *</label>
                <input type="text" id="lastName" name="lastName" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="address">Address *</label>
                <input type="text" id="address" name="address" required placeholder="Street address">
              </div>
            </div>
            <div class="form-row two-col">
              <div class="form-group">
                <label for="address2">Apartment, Suite, etc.</label>
                <input type="text" id="address2" name="address2" placeholder="Optional">
              </div>
              <div class="form-group">
                <label for="postalCode">Postal Code *</label>
                <input type="text" id="postalCode" name="postalCode" required>
              </div>
            </div>
            <div class="form-row two-col">
              <div class="form-group">
                <label for="city">City *</label>
                <input type="text" id="city" name="city" required>
              </div>
              <div class="form-group">
                <label for="country">Country *</label>
                <select id="country" name="country" required>
                  <option value="">Select country</option>
                  <option value="TR" selected>Turkey</option>
                  <option value="DE">Germany</option>
                  <option value="GB">United Kingdom</option>
                  <option value="US">United States</option>
                  <option value="FR">France</option>
                  <option value="NL">Netherlands</option>
                  <option value="AT">Austria</option>
                  <option value="CH">Switzerland</option>
                  <option value="BE">Belgium</option>
                  <option value="IT">Italy</option>
                  <option value="ES">Spain</option>
                  <option value="SE">Sweden</option>
                  <option value="DK">Denmark</option>
                  <option value="NO">Norway</option>
                  <option value="PL">Poland</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="notes">Order Notes</label>
                <textarea id="notes" name="notes" rows="2" placeholder="Special instructions (optional)"></textarea>
              </div>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-title">Payment Method</div>
            <div class="payment-methods">
              <label class="payment-option selected" data-method="card">
                <input type="radio" name="payment" value="card" checked>
                <div class="payment-option-info">
                  <div class="payment-option-label">Credit / Debit Card</div>
                  <div class="payment-option-desc">Visa, Mastercard, Amex — Secure payment via iyzico</div>
                </div>
              </label>
              <label class="payment-option" data-method="bank">
                <input type="radio" name="payment" value="bank">
                <div class="payment-option-info">
                  <div class="payment-option-label">Bank Transfer (EFT/Havale)</div>
                  <div class="payment-option-desc">Transfer to our bank account — Order ships after payment confirmation</div>
                </div>
              </label>
              <label class="payment-option" data-method="whatsapp">
                <input type="radio" name="payment" value="whatsapp">
                <div class="payment-option-info">
                  <div class="payment-option-label">Order via WhatsApp</div>
                  <div class="payment-option-desc">Send your order directly via WhatsApp — We'll confirm and arrange payment</div>
                </div>
              </label>
            </div>

            <div class="bank-details" id="bankDetails">
              <strong>Over2You</strong><br>
              IBAN: TR00 0000 0000 0000 0000 0000 00<br>
              Bank: [Bank Name]<br>
              <br>
              <em>Please include your order number in the transfer description.</em>
            </div>
          </div>

          <button type="submit" class="btn-place-order" id="placeOrderBtn">PLACE ORDER — €${total.toFixed(2)}</button>
          <button type="button" class="btn-whatsapp" id="whatsappBtn" style="display:none;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            ORDER VIA WHATSAPP
          </button>

          <div class="secure-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            SECURE CHECKOUT — 256-BIT SSL ENCRYPTED
          </div>
        </form>
      </div>

      <!-- RIGHT: Order Summary -->
      <div class="order-summary">
        <div class="order-summary-title">ORDER SUMMARY (${items.reduce((s,i)=>s+i.qty,0)} items)</div>
        ${items.map(item => `
          <div class="summary-item">
            <div class="summary-item-swatch" style="background:${item.color || '#eee'};"></div>
            <div class="summary-item-info">
              <div class="summary-item-name">${item.name}</div>
              <div class="summary-item-variant">Size: ${item.selectedSize} · Qty: ${item.qty}</div>
            </div>
            <div class="summary-item-price">€${(item.price * item.qty).toFixed(2)}</div>
          </div>
        `).join('')}
        <div class="summary-totals">
          <div class="summary-row"><span>Subtotal</span><span>€${subtotal.toFixed(2)}</span></div>
          <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? 'FREE' : '€' + shipping.toFixed(2)}</span></div>
          <div class="summary-row total"><span>Total</span><span>€${total.toFixed(2)}</span></div>
        </div>
      </div>
    `;

    // Payment method switching
    document.querySelectorAll('.payment-option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        opt.querySelector('input[type="radio"]').checked = true;
        const method = opt.dataset.method;
        document.getElementById('bankDetails').classList.toggle('visible', method === 'bank');
        document.getElementById('placeOrderBtn').style.display = method === 'whatsapp' ? 'none' : 'block';
        document.getElementById('whatsappBtn').style.display = method === 'whatsapp' ? 'flex' : 'none';
      });
    });

    // WhatsApp order
    document.getElementById('whatsappBtn').addEventListener('click', () => {
      const form = document.getElementById('orderForm');
      const name = form.firstName.value + ' ' + form.lastName.value;
      const phone = form.phone.value;
      const address = [form.address.value, form.address2.value, form.city.value, form.postalCode.value, form.country.value].filter(Boolean).join(', ');
      const orderLines = items.map(i => `• ${i.name} (${i.selectedSize}) x${i.qty} — €${(i.price*i.qty).toFixed(2)}`).join('%0A');
      const msg = `🛒 *New Order — Over2You*%0A%0A*Customer:* ${name}%0A*Phone:* ${phone}%0A*Email:* ${form.email.value}%0A*Address:* ${address}%0A%0A*Items:*%0A${orderLines}%0A%0A*Subtotal:* €${subtotal.toFixed(2)}%0A*Shipping:* ${shipping === 0 ? 'FREE' : '€' + shipping.toFixed(2)}%0A*Total:* €${total.toFixed(2)}%0A%0A${form.notes.value ? '*Notes:* ' + form.notes.value : ''}`;
      // Replace with your WhatsApp number
      window.open('https://wa.me/905XXXXXXXXX?text=' + msg, '_blank');
    });

    // Form submission
    document.getElementById('orderForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      // Validate required fields
      let valid = true;
      form.querySelectorAll('[required]').forEach(input => {
        if (!input.value.trim()) { input.classList.add('error'); valid = false; }
        else { input.classList.remove('error'); }
      });
      if (!valid) return;

      const method = form.querySelector('input[name="payment"]:checked').value;
      const orderNumber = 'O2Y-' + Date.now().toString(36).toUpperCase();

      const customer = {
        email: form.email.value,
        phone: form.phone.value,
        firstName: form.firstName.value,
        lastName: form.lastName.value,
        address: form.address.value + (form.address2.value ? ', ' + form.address2.value : ''),
        city: form.city.value,
        postalCode: form.postalCode.value,
        country: form.country.value,
        notes: form.notes.value
      };

      const orderItems = items.map(i => ({
        id: i.id, name: i.name, size: i.selectedSize, qty: i.qty,
        price: i.price, category: i.category, color: i.color
      }));

      // === CARD PAYMENT (iyzico) ===
      if (method === 'card') {
        const btn = document.getElementById('placeOrderBtn');
        btn.textContent = 'PROCESSING...';
        btn.disabled = true;

        // Get API URL from settings or fallback
        const apiUrl = (window.siteSettings && window.siteSettings.iyzicoApiUrl) || 'http://145.223.82.188:3001';

        try {
          const res = await fetch(apiUrl + '/api/payment/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ customer, items: orderItems, shippingCost: shipping })
          });

          const data = await res.json();

          if (data.success && data.checkoutFormContent) {
            // Save order locally
            const order = { orderNumber: data.orderNumber, date: new Date().toISOString(), customer, items: orderItems, subtotal, shipping, total, paymentMethod: 'card', status: 'pending' };
            const orders = JSON.parse(localStorage.getItem('over2you_orders') || '[]');
            orders.push(order);
            localStorage.setItem('over2you_orders', JSON.stringify(orders));

            // Show iyzico checkout form
            const formDiv = document.createElement('div');
            formDiv.id = 'iyzico-form';
            formDiv.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem;';
            formDiv.innerHTML = '<div style="background:#fff;border-radius:8px;max-width:500px;width:100%;max-height:90vh;overflow:auto;padding:2rem;position:relative;"><button onclick="document.getElementById(\'iyzico-form\').remove()" style="position:absolute;top:10px;right:15px;background:none;border:none;font-size:24px;cursor:pointer;">×</button>' + data.checkoutFormContent + '</div>';
            document.body.appendChild(formDiv);

            // Clear cart on successful redirect
            localStorage.removeItem('over2you_cart');
          } else {
            alert('Payment error: ' + (data.error || 'Unknown error'));
            btn.textContent = 'PLACE ORDER — €' + total.toFixed(2);
            btn.disabled = false;
          }
        } catch(e) {
          alert('Could not connect to payment server. Please try WhatsApp or Bank Transfer.');
          btn.textContent = 'PLACE ORDER — €' + total.toFixed(2);
          btn.disabled = false;
        }
        return;
      }

      // === BANK / OTHER PAYMENTS ===
      const order = {
        orderNumber, date: new Date().toISOString(), customer,
        items: orderItems, subtotal, shipping, total, paymentMethod: method
      };

      const orders = JSON.parse(localStorage.getItem('over2you_orders') || '[]');
      orders.push(order);
      localStorage.setItem('over2you_orders', JSON.stringify(orders));
      localStorage.removeItem('over2you_cart');
      window.location.href = 'confirmation.html?order=' + orderNumber + '&method=' + method;
    });
  });
  </script>
</body>
</html>
